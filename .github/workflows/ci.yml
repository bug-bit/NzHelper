name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint & Build (Debug)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Lint (Debug)
        run: ./gradlew lintDebug --stacktrace

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: app/build/reports/lint-results-*.html
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NzHelper-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

  release:
    name: Build Release APK & Publish Telegram
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decode signing keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::KEYSTORE_BASE64 未配置，将使用 Debug 签名。"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

          [ -s "$RUNNER_TEMP/release.keystore" ] || exit 1

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Build Release APK
        env:
          NZH_KEYSTORE_FILE: ${{ steps.keystore.outputs.enabled == 'true' && format('{0}/release.keystore', runner.temp) || '' }}
          NZH_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          NZH_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          NZH_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NzHelper-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish Release APK to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -uo pipefail

          [ -n "${TELEGRAM_BOT_TOKEN}" ] || exit 1
          [ -n "${TELEGRAM_CHAT_ID}" ] || exit 1

          APK=$(find app/build/outputs/apk/release -type f -name '*.apk' -print -quit)
          [ -f "${APK}" ] || exit 1

          esc() {
            sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'
          }

          commit_sha="${GITHUB_SHA}"
          commit_subject=$(git log -1 --format=%s | esc)
          author="${GITHUB_ACTOR}"
          repo_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          commit_url="${repo_url}/commit/${commit_sha}"

          caption=$(cat <<EOF
          New push to GitHub!

          <pre>${commit_subject}</pre>

          by ${author}
          <a href="${commit_url}">See commit detail here</a>
          EOF
          )

          response=$(curl -fsS \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "document=@${APK}" \
            -F "caption=${caption}" \
            -F "parse_mode=HTML" \
            -F "disable_content_type_detection=true")

          echo "$response" | grep -q '"ok":true'