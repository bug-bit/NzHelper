name: Release

on:
  push:
    branches: [ main, master ]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Build Release APK & Publish to Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decode signing keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::KEYSTORE_BASE64 secret 未配置，release APK 将使用 debug 签名（仅测试用）。"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

          if [ ! -s "$RUNNER_TEMP/release.keystore" ]; then
            echo "::error::keystore 解码后为空，请检查 KEYSTORE_BASE64 内容。"
            exit 1
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Build Release APK
        env:
          NZH_KEYSTORE_FILE: ${{ steps.keystore.outputs.enabled == 'true' && format('{0}/release.keystore', runner.temp) || '' }}
          NZH_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          NZH_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          NZH_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Publish Release APK to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -uo pipefail

          [ -n "${TELEGRAM_BOT_TOKEN}" ] || {
            echo "::error::未配置 TELEGRAM_BOT_TOKEN。"
            exit 1
          }

          [ -n "${TELEGRAM_CHAT_ID}" ] || {
            echo "::error::未配置 TELEGRAM_CHAT_ID。"
            exit 1
          }

          APK=$(find app/build/outputs/apk/release -type f -name '*.apk' -print -quit)

          [ -f "${APK}" ] || {
            echo "::error::未找到 release APK 文件。"
            exit 1
          }

          esc() {
            sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'
          }

          commit_sha="${GITHUB_SHA}"
          commit_subject=$(git log -1 --format=%s | esc)
          author="${GITHUB_ACTOR}"
          repo_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          commit_url="${repo_url}/commit/${commit_sha}"

          caption=$(cat <<EOF
          New push to GitHub!

          <pre>${commit_subject}</pre>

          by ${author}
          <a href="${commit_url}">See commit detail here</a>
          EOF
          )

          response=$(curl -sS \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "document=@${APK}" \
            -F "caption=${caption}" \
            -F "parse_mode=HTML" \
            -F "disable_content_type_detection=true")

          echo "${response}" | grep -q '"ok":true' || {
            echo "::error::Telegram API 返回错误。"
            exit 1
          }